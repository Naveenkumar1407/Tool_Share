server.port=8082
spring.application.name=tool-service

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/tooldb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT - must match user-service secret
jwt.secret=MyToolShareSecretKeyThatIsLongEnoughForHS256Algorithm2024
jwt.expiration=86400000

# user-service URL for inter-service calls
user.service.url=http://localhost:8081
